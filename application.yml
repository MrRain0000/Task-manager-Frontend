server:
  port: ${PORT:8080}

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/task_management_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: root
    password: ${DB_PASSWORD:root}
  
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false

# Logging configuration
logging:
  level:
    com.example.task_management: INFO
    org.springframework.security: WARN

# JWT configuration
jwt:
  secret: ${JWT_SECRET:change-me-in-production}
  expiration-ms: 86400000  # 24 hours

# Application settings
app:
  # Email verification settings
  email:
    from: verification@nguyenducthinh0.id.vn
  
  # Frontend URL for email verification links
  # Format: http://localhost:5173/verify-email
  # Java code will append: ?token={token}
  frontend:
    url: http://localhost:5173/verify-email

# Google OAuth
google:
  client-id: ${GOOGLE_CLIENT_ID}

# Resend API Key for sending emails
# Get from: https://resend.com
RESEND_API_KEY: ${RESEND_API_KEY}
